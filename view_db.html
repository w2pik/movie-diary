<title>Movie Database Viewer</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', Microsoft YaHei, sans-serif; background:#1a1a2e; color:#eee; padding:20px; }
h1 { text-align:center; margin-bottom:8px; color:#e94560; }
.subtitle { text-align:center; color:#666; margin-bottom:20px; font-size:14px; }
.stats { display:flex; gap:15px; justify-content:center; margin-bottom:20px; flex-wrap:wrap; }
.stat-card { background:#16213e; padding:15px 25px; border-radius:10px; text-align:center; min-width:100px; }
.stat-card .num { font-size:32px; font-weight:bold; color:#e94560; }
.stat-card .label { font-size:13px; color:#aaa; margin-top:5px; }
.controls { display:flex; gap:10px; margin-bottom:20px; justify-content:center; flex-wrap:wrap; }
.controls input, .controls select, .controls button { padding:8px 15px; border-radius:6px; border:1px solid #333; background:#16213e; color:#eee; font-size:14px; outline:none; }
.controls input:focus, .controls select:focus { border-color:#e94560; }
.controls button { background:#e94560; border:none; cursor:pointer; font-weight:bold; }
.controls button:hover { background:#c23152; }
.table-wrap { overflow-x:auto; border-radius:10px; }
table { width:100%; border-collapse:collapse; background:#16213e; min-width:900px; }
th { background:#0f3460; padding:12px 10px; text-align:left; font-size:13px; white-space:nowrap; position:sticky; top:0; z-index:1; }
th:hover { background:#1a4a7a; }
td { padding:8px 10px; border-bottom:1px solid #1a1a3e; font-size:13px; max-width:250px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
tr:hover { background:#1e2d50; }
.movie-title { color:#e94560; font-weight:bold; cursor:pointer; }
.movie-title:hover { text-decoration:underline; }
.rating { color:#ffd700; font-weight:bold; }
.rating-zero { color:#444; }
.ori-title { color:#888; font-size:11px; }
#count { color:#e94560; }
</style>
</head>
<body>
<h1>Movie Tracker</h1>
<p class="subtitle">个人电影数据库浏览</p>
<div class="stats" id="stats"></div>
<div class="controls">
  <input type="text" id="search" placeholder="搜索电影名 / 导演..." oninput="render()">
  <select id="yearFilter" onchange="render()"><option value="">全部年份</option></select>
  <select id="ratingFilter" onchange="render()">
    <option value="">全部评分</option>
    <option value="rated">已评分</option>
    <option value="unrated">未评分</option>
    <option value="8">≥ 8分</option>
    <option value="6">≥ 6分</option>
  </select>
  <select id="countryFilter" onchange="render()"><option value="">全部国家</option></select>
  <button onclick="render()">🔍 搜索</button>
  <button onclick="document.getElementById('search').value='';document.getElementById('yearFilter').value='';document.getElementById('ratingFilter').value='';document.getElementById('countryFilter').value='';render();">重置</button>
</div>
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>ID</th><th>电影名</th><th>年份</th><th>导演</th><th>国家</th>
        <th>类型</th><th>我的评分</th><th>片长</th><th>语言</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>
<p style="text-align:center;color:#555;margin-top:15px;" id="count"></p>

  const avg = rated.length > 0 ? (rated.reduce((s,m) => s+m.my_rating, 0)/rated.length).toFixed(1) : '-';
  const countries = {};
  DATA.forEach(m => {
    if(m.country) m.country.split('/').forEach(c => { c = c.trim(); if(c) countries[c] = (countries[c]||0)+1; });
  });
  const topEntry = Object.entries(countries).sort((a,b) => b[1]-a[1])[0];
  const highRated = DATA.filter(m => m.my_rating >= 8).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="label">总电影数</div></div>
    <div class="stat-card"><div class="num">${rated.length}</div><div class="label">已评分</div></div>
    <div class="stat-card"><div class="num">${avg}</div><div class="label">平均评分</div></div>
    <div class="stat-card"><div class="num">${highRated}</div><div class="label">高分电影 (≥8)</div></div>
    <div class="stat-card"><div class="num">${topEntry ? topEntry[0] : '-'}</div><div class="label">最多国家 (${topEntry ? topEntry[1] : 0}部)</div></div>
  `;
}

function populateFilters() {
  const years = [...new Set(DATA.map(m => m.year).filter(Boolean))].sort();
  const selY = document.getElementById('yearFilter');
  years.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y; selY.appendChild(o); });

  const countries = new Set();
  DATA.forEach(m => { if(m.country) m.country.split('/').forEach(c => { c = c.trim(); if(c) countries.add(c); }); });
  const selC = document.getElementById('countryFilter');
  [...countries].sort().forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; selC.appendChild(o); });
}

function render() {
  let filtered = [...DATA];
  const search = document.getElementById('search').value.toLowerCase();
  const year = document.getElementById('yearFilter').value;
  const rating = document.getElementById('ratingFilter').value;
  const country = document.getElementById('countryFilter').value;
  if(search) filtered = filtered.filter(m => (m.title||'').toLowerCase().includes(search) || (m.director||'').toLowerCase().includes(search));
  if(year) filtered = filtered.filter(m => m.year == year);
  if(rating === 'rated') filtered = filtered.filter(m => m.my_rating > 0);
  if(rating === 'unrated') filtered = filtered.filter(m => m.my_rating == 0);
  if(rating === '8') filtered = filtered.filter(m => m.my_rating >= 8);
  if(rating === '6') filtered = filtered.filter(m => m.my_rating >= 6);
  if(country) filtered = filtered.filter(m => m.country && m.country.includes(country));

  document.getElementById('tableBody').innerHTML = filtered.map(m => `
    <tr>
      <td>${m.id}</td>
      <td><span class="movie-title" title="${m.original_title || ''}">${m.title || ''}</span></td>
      <td>${m.year || ''}</td>
      <td>${(m.director || '').substring(0,25)}</td>
      <td>${(m.country || '').substring(0,20)}</td>
      <td>${(m.genre || '').substring(0,30)}</td>
      <td class="${m.my_rating > 0 ? 'rating' : 'rating-zero'}">${m.my_rating > 0 ? '⭐'+m.my_rating : '-'}</td>
      <td>${m.duration || ''}</td>
      <td>${(m.language || '').substring(0,20)}</td>
    </tr>
  `).join('');
  document.getElementById('count').textContent = `共 ${filtered.length} 部电影`;
}

init();
</script>
</body>
</html>
